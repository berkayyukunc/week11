{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polls | Active Polls</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>
    <div class="app-container">
        <p class="header-subtitle">✨ Polls Backend</p>
        <h1 class="header-title">Active Polls</h1>

        {% if latest_question_list %}
            <ul class="poll-list">
            {% for question in latest_question_list %}
                <li class="poll-item">
                    <a href="{% url 'polls:detail' question.id %}" class="poll-card">
                        <div class="poll-info">
                            <span class="poll-icon">📊</span>
                            <span class="poll-text">{{ question.question_text }}</span>
                        </div>
                        <span class="poll-arrow">→</span>
                    </a>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <div class="empty-state">
                <p>No polls are available.</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
